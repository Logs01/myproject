<!DOCTYPE html>

<html>

<head>
    <title>Ugly Movie Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Not an Ordinary Movie Booking System - By Team Thamizhi</h1>

<div class="menu">

<button onclick="startBooking()">Start Booking</button> <button onclick="cancelBooking()">Cancel Booking</button> <button onclick="generateSeat()">Random Seat</button>

</div>

<div id="step1" class="section">

<h2>Step 1: Choose Movie</h2>

<select id="movie">

<option>Avengers: Budget Version</option>
<option>Fast & Furious Bicycle Drift</option>
<option>Harry Potter and the Missing Homework</option>
<option>Spider-Man: No Network Connection</option>
<option>Titanic 2: Jack Floats Back</option>

</select>

<br><br>

<button onclick="nextSeats()">Next</button>

</div>

<div id="step2" class="section">

<h2>Step 2: Choose Seats</h2>

<select id="seats">

<option>1 Seat (Lonely Mode)</option>
<option>2 Seats (Date maybe?)</option>
<option>5 Seats (Entire Gang)</option>

</select>

<br><br>

<button onclick="nextPayment()">Next</button>

</div>

<div id="step3" class="section">

<h2>Step 3: Payment</h2>

<select id="payment">

<option>UPI (Instant regret)</option>
<option>Credit Card (Money gone)</option>
<option>Cash (Old school hero)</option>

</select>

<br><br>

<button onclick="makePayment()">Pay Now</button>

</div>

<div id="ticket" class="section">

<h2>🎟 Your Ticket</h2>

<p id="ticketText"></p>

<button onclick="location.reload()">Book Again</button>

</div>

<script src="script.js"></script>

</body>
</html>
